<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMS — Trader Desktop</title>
    <style>
      :root {
        --bg: #0b0e13;
        --panel: #11151d;
        --edge: #1d2433;
        --text: #c9d4e3;
        --muted: #5c6b82;
        --accent: #3fb68b;
        --warn: #e0a23f;
        --down: #d9534f;
        font-size: 13px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 6px;
        padding: 6px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 6px 12px;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 4px;
      }
      header h1 {
        font-size: 13px;
        letter-spacing: 0.18em;
        margin: 0;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
      }
      header .desk {
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      header .spacer {
        flex: 1;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 10px;
        border: 1px solid var(--edge);
        border-radius: 10px;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.06em;
      }
      .chip i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
      }
      .chip.live i {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
      }
      .chip.reconnecting i {
        background: var(--warn);
      }
      .chip.down i {
        background: var(--down);
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 0;
      }
      .panel {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 4px;
        min-height: 0;
        overflow: hidden;
      }
      .panel > h2 {
        margin: 0;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: var(--muted);
        border-bottom: 1px solid var(--edge);
      }
      .panel > perspective-viewer {
        flex: 1;
        min-height: 0;
      }
      #orders-panel {
        flex: 11;
      }
      #lower {
        flex: 9;
        display: flex;
        gap: 6px;
        min-height: 0;
      }
      #lower .panel {
        flex: 1;
      }
      /* Logon overlay */
      #logon {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 14, 0.92);
        z-index: 10;
      }
      #logon form {
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 6px;
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 320px;
      }
      #logon h1 {
        font-size: 14px;
        letter-spacing: 0.18em;
        margin: 0 0 6px;
        color: var(--accent);
      }
      #logon label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      #logon input {
        background: var(--bg);
        border: 1px solid var(--edge);
        border-radius: 4px;
        color: var(--text);
        padding: 8px 10px;
        font-family: inherit;
      }
      #logon button {
        background: var(--accent);
        color: #06281d;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        padding: 9px;
        letter-spacing: 0.1em;
        cursor: pointer;
      }
      #logon .error {
        color: var(--down);
        font-size: 12px;
        min-height: 16px;
        margin: 0;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="logon">
      <form id="logon-form">
        <h1>CROSS-ASSET EMS</h1>
        <label for="token">LOGON TOKEN</label>
        <input id="token" name="token" value="trader-token" autocomplete="off" />
        <p class="error" id="logon-error"></p>
        <button type="submit">CONNECT</button>
      </form>
    </div>

    <div id="app" class="hidden">
      <header>
        <h1>CROSS-ASSET EMS</h1>
        <span class="desk" id="session-label">—</span>
        <span class="spacer"></span>
        <span class="chip" id="chip-orders"><i></i>ORDERS</span>
        <span class="chip" id="chip-routes"><i></i>ROUTES</span>
        <span class="chip" id="chip-fills"><i></i>FILLS</span>
      </header>
      <main>
        <section class="panel" id="orders-panel">
          <h2>ORDER BLOTTER</h2>
          <perspective-viewer id="orders-viewer"></perspective-viewer>
        </section>
        <div id="lower">
          <section class="panel">
            <h2>ROUTES</h2>
            <perspective-viewer id="routes-viewer"></perspective-viewer>
          </section>
          <section class="panel">
            <h2>FILLS</h2>
            <perspective-viewer id="fills-viewer"></perspective-viewer>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
