# venue_session.fsm.yaml
#
# Authoring history:
#   - 2026-06-06: initial draft generated by local Gemma-4-31B (see
#                 venue_session.fsm.gemma-draft.yaml for the verbatim draft).
#   - 2026-06-06: refined by review — added TestRequest sub-state for the
#                 heartbeat-missed path (FIX convention before declaring
#                 disconnect), modelled inbound ResendRequest from the
#                 venue, added SequenceReset (35=4 with GapFill 123=Y/N)
#                 handling, made transition guards explicit, normalised
#                 effect names, added context_schema.
#
# Conforms to the FSM definition format documented in
# 80_architecture/arch-fix-fsm-design.md. This is the session-layer FSM,
# distinct from the order/route FSMs (those carry FIX OrdStatus mappings;
# this is purely a session state machine with no OrdStatus to project).

fsm:
  name: VenueSession
  version: 1

# Session FSM has no FIX OrdStatus mapping — these are session-level states,
# not order states. The fix_ord_status field is omitted on states.

states:
  - name: Disconnected
    terminal: false
    description: No live session; ready to attempt connect.
  - name: Connecting
    terminal: false
    description: TCP connection attempt in progress.
  - name: LogonSent
    terminal: false
    description: TCP established; outbound 35=A Logon sent; awaiting response.
  - name: Active
    terminal: false
    description: Session established; exchanging heartbeats and application messages.
  - name: TestRequestSent
    terminal: false
    description: Heartbeat overdue from venue; 35=1 TestRequest sent; awaiting response.
  - name: ResendInProgress
    terminal: false
    description: Gap detected; outbound 35=2 ResendRequest sent; awaiting fill.
  - name: SequenceResetting
    terminal: false
    description: Inbound 35=4 SequenceReset (GapFill or Reset mode) being processed.
  - name: LogoutInProgress
    terminal: false
    description: Logout (35=5) initiated; awaiting confirmation.

events:
  # Inbound (from network or operator)
  - { name: connect_request,        direction: in,  source: operator }
  - { name: tcp_connected,          direction: in,  source: network }
  - { name: tcp_failed,             direction: in,  source: network }
  - { name: logon_ack,              direction: in,  source: venue }  # 35=A inbound
  - { name: logon_reject,           direction: in,  source: venue }  # 35=5 Logout with reason, or 35=3 Reject
  - { name: heartbeat_received,     direction: in,  source: venue }  # 35=0
  - { name: heartbeat_missed,       direction: in,  source: clock }
  - { name: test_request_response,  direction: in,  source: venue }  # any inbound after our 35=1
  - { name: test_request_timeout,   direction: in,  source: clock }
  - { name: gap_detected,           direction: in,  source: session_layer }
  - { name: resend_complete,        direction: in,  source: session_layer }
  - { name: inbound_resend_request, direction: in,  source: venue }  # venue asked us for 35=2
  - { name: sequence_reset_received,direction: in,  source: venue }  # 35=4
  - { name: logout_request,         direction: in,  source: operator }
  - { name: logout_received,        direction: in,  source: venue }  # 35=5 from venue
  - { name: logout_ack,             direction: in,  source: venue }
  - { name: unexpected_disconnect,  direction: in,  source: network }

  # Outbound (effects emit these messages — declared as events for symmetry)
  - { name: send_logon,             direction: out }   # 35=A
  - { name: send_heartbeat,         direction: out }   # 35=0 periodic
  - { name: send_test_request,      direction: out }   # 35=1
  - { name: send_resend_request,    direction: out }   # 35=2
  - { name: send_resend_messages,   direction: out }   # 35=4 GapFill in reply to inbound 35=2
  - { name: send_logout,            direction: out }   # 35=5

context_schema:
  session_id:                 string
  next_expected_seq_in:       uint64
  next_send_seq_out:          uint64
  heartbeat_interval_seconds: int
  test_request_outstanding:   bool
  resend_window_low:          uint64
  resend_window_high:         uint64

transitions:
  # ---- Connect path ----
  - { from: Disconnected, on: connect_request,
      to: Connecting,
      emit: [],
      effects: [initiate_tcp_handshake] }
  - { from: Connecting, on: tcp_connected,
      to: LogonSent,
      emit: [send_logon],
      effects: [start_logon_timer] }
  - { from: Connecting, on: tcp_failed,
      to: Disconnected,
      emit: [],
      effects: [log_connection_error, schedule_reconnect] }

  # ---- Logon path ----
  - { from: LogonSent, on: logon_ack,
      to: Active,
      emit: [],
      effects: [reset_heartbeat_timer, mark_session_active] }
  - { from: LogonSent, on: logon_reject,
      to: Disconnected,
      emit: [],
      effects: [close_socket, log_logon_failure] }

  # ---- Heartbeat path ----
  - { from: Active, on: heartbeat_received,
      to: Active,
      emit: [],
      effects: [reset_heartbeat_timer] }
  - { from: Active, on: heartbeat_missed,
      to: TestRequestSent,
      emit: [send_test_request],
      effects: [start_test_request_timer] }
  - { from: TestRequestSent, on: test_request_response,
      to: Active,
      emit: [],
      effects: [reset_heartbeat_timer, cancel_test_request_timer] }
  - { from: TestRequestSent, on: test_request_timeout,
      to: Disconnected,
      emit: [],
      effects: [close_socket, log_session_stale] }

  # ---- Gap detection & resend ----
  - { from: Active, on: gap_detected,
      to: ResendInProgress,
      emit: [send_resend_request],
      effects: [pause_application_messages, record_resend_window] }
  - { from: ResendInProgress, on: resend_complete,
      to: Active,
      emit: [],
      effects: [resume_application_messages, advance_next_expected_seq] }

  # ---- Inbound resend request (venue asks us to resend) ----
  - { from: Active, on: inbound_resend_request,
      to: Active,
      emit: [send_resend_messages],
      effects: [build_resend_payload_with_gap_fill] }

  # ---- Sequence reset (35=4) ----
  - { from: ResendInProgress, on: sequence_reset_received,
      to: SequenceResetting,
      emit: [],
      effects: [validate_reset_seq_not_lower] }
  - { from: Active, on: sequence_reset_received,
      to: SequenceResetting,
      emit: [],
      effects: [validate_reset_seq_not_lower] }
  - { from: SequenceResetting, on: resend_complete,    # treat as completion
      to: Active,
      emit: [],
      effects: [apply_reset_to_next_expected_seq] }

  # ---- Logout path (graceful) ----
  - { from: Active, on: logout_request,
      to: LogoutInProgress,
      emit: [send_logout],
      effects: [start_logout_timer] }
  - { from: Active, on: logout_received,
      to: LogoutInProgress,
      emit: [send_logout],
      effects: [acknowledge_inbound_logout] }
  - { from: LogoutInProgress, on: logout_ack,
      to: Disconnected,
      emit: [],
      effects: [close_socket, finalize_session] }

  # ---- Unexpected disconnect from any non-terminal state ----
  - { from: LogonSent,        on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
  - { from: Active,           on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
  - { from: TestRequestSent,  on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
  - { from: ResendInProgress, on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
  - { from: SequenceResetting,on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
  - { from: LogoutInProgress, on: unexpected_disconnect, to: Disconnected, emit: [], effects: [cleanup_session] }
