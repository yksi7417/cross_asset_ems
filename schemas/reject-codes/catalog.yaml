  - { code: EMS-ORD-6413, category: ORD, severity: warning, title: "COMMODITY: Heating oil winter spec", description: "Heating-oil and propane contracts have seasonal specifications; off-season trades require an override." }
  - { code: EMS-ORD-6414, category: ORD, severity: error, title: "COMMODITY: Softs agricultural grade", description: "For soft commodities (sugar, coffee, cocoa, cotton), grade must be from the ICE/Euronext list." }
  - { code: EMS-ORD-6415, category: ORD, severity: error, title: "COMMODITY: Emissions allowance phase", description: "EU ETS and similar emissions trades must specify the phase (e.g., Phase 4, 2021-2030) and vintage." }
  - { code: EMS-ORD-6416, category: ORD, severity: error, title: "COMMODITY: Freight route valid", description: "For dry-bulk and wet-bulk freight derivatives, the route (e.g., TD3C, TD20) must be a published basket." }
  - { code: EMS-ORD-6417, category: ORD, severity: error, title: "COMMODITY: Strike within band option", description: "For commodity options, strike must be within ±5% of the settlement average; outside this is a hard reject." }
  - { code: EMS-ORD-6418, category: ORD, severity: error, title: "COMMODITY: Spread leg validity", description: "Crack-spread / spark-spread trades must have legs with same product_family, distinct contracts, and matched UoM." }
  - { code: EMS-ORD-6501, category: ORD, severity: error, title: "CRYPTO: Chain id valid", description: "chain_id must match a recognized EVM (or non-EVM) chain identifier; reject unknown networks." }
  - { code: EMS-ORD-6502, category: ORD, severity: error, title: "CRYPTO: Contract address format", description: "contract_address must be a 20-byte hex string with EIP-55 checksum (or all-lowercase for non-checksummed)." }
  - { code: EMS-ORD-6503, category: ORD, severity: error, title: "CRYPTO: Decimals in range", description: "Token decimals must be in [0, 18] for ERC-20; 0 for ERC-721; 8 for native BTC; 9 for native SOL." }
  - { code: EMS-ORD-6504, category: ORD, severity: error, title: "CRYPTO: Total supply sanity", description: "total_supply must be a non-negative integer (in token's smallest unit); >0 for tradeable tokens." }
