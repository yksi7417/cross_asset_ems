input {
  beats {
    port => 5044
    host => "0.0.0.0"
    ssl => false
    congestion_threshold => 10000
    client_inactivity_timeout => 60
  }
  tcp {
    port => 5046
    codec => json_lines
    tags => ["tcp-json"]
  }
  udp {
    port => 5047
    codec => json_lines
    tags => ["udp-json"]
  }
}

filter {
  if [agent][type] == "filebeat" or "filebeat" in [tags] {
    mutate { add_field => { "[@metadata][source]" => "filebeat" } }
  }

  if "tcp-json" in [tags] or "udp-json" in [tags] {
    mutate { add_field => { "[@metadata][source]" => "raw-syslog" } }
  }

  if [message] {
    json {
      source => "message"
      target => "ems"
      skip_on_invalid_json => true
      remove_field => [ "message" ]
    }
  }

  if ![ems] and [host][name] {
    json {
      source => "[host][name]"
      target => "ems"
      skip_on_invalid_json => true
    }
  }

  if [ems][timestamp] {
    date {
      match => [ "[ems][timestamp]", "yyyy-MM-dd'T'HH:mm:ss.SSSXXX", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd'T'HH:mm:ssXXX", "yyyy-MM-dd'T'HH:mm:ssZ", "ISO8601" ]
      target => "@timestamp"
      remove_field => [ "[ems][timestamp]" ]
    }
  } else {
    date {
      match => [ "@timestamp", "ISO8601" ]
    }
  }

  mutate {
    rename => {
      "[ems][level]"      => "[log][level]"
      "[ems][service]"    => "[service][name]"
      "[ems][logger]"     => "[log][logger]"
      "[ems][trace_id]"   => "[trace][id]"
      "[ems][span_id]"    => "[span][id]"
      "[ems][parent_span_id]" => "[span][parent_id]"
      "[ems][thread]"     => "[process][thread][name]"
      "[ems][host]"       => "[host][name]"
    }
    copy => {
      "[service][name]" => "[@metadata][service]"
    }
    lowercase => [ "[log][level]", "[service][name]" ]
  }

  if [ems][error] {
    mutate { rename => { "[ems][error]" => "[error][message]" } }
  }
  if [ems][stack] {
    mutate { rename => { "[ems][stack]" => "[error][stack_trace]" } }
  }
  if [ems][exception] {
    mutate { rename => { "[ems][exception]" => "[error][type]" } }
  }

  if [ems][duration_ms] {
    mutate {
      convert => { "[ems][duration_ms]" => "integer" }
      rename => { "[ems][duration_ms]" => "[event][duration]" }
    }
  }
  if [ems][order_id] {
    mutate { rename => { "[ems][order_id]" => "[labels][order_id]" } }
  }
  if [ems][venue] {
    mutate { rename => { "[ems][venue]" => "[labels][venue]" } }
  }
  if [ems][symbol] {
    mutate { rename => { "[ems][symbol]" => "[labels][symbol]" } }
  }
  if [ems][asset_class] {
    mutate { rename => { "[ems][asset_class]" => "[labels][asset_class]" } }
  }
  if [ems][client_id] {
    mutate { rename => { "[ems][client_id]" => "[user][id]" } }
  }

  if [log][level] == "warn" { mutate { add_field => { "[log][syslog][severity][name]" => "warning" } } }
  if [log][level] == "error" { mutate { add_field => { "[log][syslog][severity][name]" => "error" } } }
  if [log][level] == "fatal" { mutate { add_field => { "[log][syslog][severity][name]" => "critical" } } }

  if [log][level] in ["error", "fatal"] or [log][level] == "critical" {
    mutate { add_tag => [ "ems_alert" ] }
  }
  if [service][name] in ["ems-oms", "ems-router", "ems-pricing", "ems-risk", "ems-marketdata", "ems-position", "ems-validator", "ems-observability"] {
    mutate { add_field => { "[@metadata][valid_service]" => "true" } }
  } else {
    mutate { add_tag => [ "ems_unknown_service" ] }
  }

  mutate {
    add_field => {
      "[service][environment]" => "production"
      "[service][framework]"   => "cross-asset-ems"
      "[host][os][family]"     => "linux"
      "[host][container][runtime]" => "docker"
      "[ecs][version]"         => "8.11.0"
      "[data_stream][namespace]" => "default"
      "[data_stream][dataset]"   => "ems.application"
    }
    remove_field => [ "agent", "ecs", "input", "[ems]" ]
  }

  if [@metadata][service] in ["ems-oms","ems-pricing","ems-risk","ems-marketdata","ems-position","ems-router","ems-validator","ems-observability"] {
    mutate { add_field => { "[@metadata][index_prefix]" => "ems-logs" } }
  } else {
    mutate { add_field => { "[@metadata][index_prefix]" => "ems-logs-misc" } }
  }

  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "[@metadata][index_date]"
  }
  mutate { copy => { "[@metadata][index_date]" => "[@metadata][index_date_str]" } }
}

output {
  if [@metadata][source] == "filebeat" {
    opensearch {
      hosts => ["https://opensearch-node1:9200", "https://opensearch-node2:9200", "https://opensearch-node3:9200"]
      user => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl_enabled => true
      ssl_verification_mode => "full"
      truststore => "/usr/share/logstash/config/opensearch-truststore.jks"
      truststore_password => "${OPENSEARCH_TRUSTSTORE_PASSWORD}"
      index => "%{[@metadata][index_prefix]}-%{[@metadata][index_date_str]}"
      manage_template => false
      template_name => "ems-logs-template"
      ilm_enabled => true
      ilm_policy => "ems-logs-policy"
      action => "create"
      document_id => "%{[@metadata][service]}-%{[@timestamp]}-%{[_id]}"
    }
  }
  if "ems_alert" in [tags] {
    opensearch {
      hosts => ["https://opensearch-node1:9200"]
      user => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl_enabled => true
      index => "ems-alerts-%{[@metadata][index_date_str]}"
      manage_template => false
    }
  }
  if "_logstash_parse_error" in [tags] or "ems_unknown_service" in [tags] {
    opensearch {
      hosts => ["https://opensearch-node1:9200"]
      user => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl_enabled => true
      index => "ems-logs-failed-%{[@metadata][index_date_str]}"
      manage_template => false
    }
  }
  if "tcp-json" in [tags] or "udp-json" in [tags] {
    opensearch {
      hosts => ["https://opensearch-node1:9200"]
      user => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl_enabled => true
      index => "ems-logs-raw-%{[@metadata][index_date_str]}"
      manage_template => false
    }
  }
  if [log][level] == "debug" and ![log][level] {
    # drop empty
  }
  if [log][level] == "trace" {
    drop { }
  }
}
