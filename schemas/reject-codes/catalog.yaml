  - { code: EMS-ORD-6614, category: ORD, severity: error, title: "ABS: Trustee present and valid", description: "A trustee must be named. For US deals this is typically a bank trust company; for European deals a fiduciary or licensed trustee." }
  - { code: EMS-ORD-6615, category: ORD, severity: error, title: "ABS: Next payment date strictly after last payment date", description: "The next scheduled payment date must be strictly greater than the last paid / record payment date and must be a business day in the deal's payment calendar." }
