  - { code: EMS-ORD-6602, category: ORD, severity: error, title: "ABS: CUSIP present for US-domiciled deals", description: "ABS positions from US-domiciled issuers or trust structures must carry a valid 9-character CUSIP. The check digit (9th character) is validated against the st..." }
  - { code: EMS-ORD-6603, category: ORD, severity: error, title: "ABS: Deal and tranche identifiers required", description: "Each ABS position must reference both a deal_id (the issuing trust or shelf) and a tranche_id (the specific class). These together form the natural key and m..." }
  - { code: EMS-ORD-6604, category: ORD, severity: error, title: "ABS: Original principal must be positive", description: "The original face / principal balance of the tranche at issuance must be a strictly positive number expressed in the deal currency." }
  - { code: EMS-ORD-6605, category: ORD, severity: error, title: "ABS: Current outstanding cannot exceed original principal", description: "Outstanding principal at the current pool cut cannot exceed the original principal at issuance. This guards against manual override errors and feed re-mappin..." }
  - { code: EMS-ORD-6606, category: ORD, severity: error, title: "ABS: Currency is a valid ISO 4217 code", description: "The position currency must be a 3-letter uppercase ISO 4217 code and must exist in the active currency reference table." }
  - { code: EMS-ORD-6607, category: ORD, severity: error, title: "ABS: Coupon type is from approved enum", description: "Coupon type must be one of: FIXED, FLOATING, STEP_UP, STEP_DOWN, DEFERRED, PIK, ZERO_COUPON, INVERSE_FLOAT." }
