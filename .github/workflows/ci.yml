name: CI

# Hybrid fast/full model:
#   - Push to a feature branch  → FAST lane: compile + unit tests only (java, cpp).
#   - Pull request → main        → FULL gate: + spotless, lint, schema, sbom (and
#                                  CodeQL via codeql.yml).
#   - Push to main               → FULL gate (post-merge safety net).
# Full-gate jobs/steps are guarded by:
#   github.event_name != 'push' || github.ref == 'refs/heads/main'
# i.e. everything runs EXCEPT on a push to a non-main branch, which is fast-only.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---- Java multi-module Gradle build ----------------------------------------
  java:
    name: Java build + unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Verify the committed gradle-wrapper.jar matches a known-good Gradle
      # release checksum before we execute it.
      - uses: gradle/actions/wrapper-validation@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}

      # Fast lane: compile + unit tests always run (feature pushes included).
      - name: Compile
        run: ./gradlew --no-daemon assemble

      - name: Unit tests
        run: ./gradlew --no-daemon allTests

      # Verify committed FSM sources match what the codegen script would produce.
      # pyyaml is available on ubuntu-24.04 runners as a system package.
      - name: FSM sources sync check
        if: github.event_name != 'push' || github.ref == 'refs/heads/main'
        run: |
          python3 tools/codegen/fsm_codegen.py --java-only
          git diff --exit-code java/ems-fsm/src/main/generated/

      # Full gate only: skip on feature-branch pushes for fast feedback.
      - name: Spotless check
        if: github.event_name != 'push' || github.ref == 'refs/heads/main'
        run: ./gradlew --no-daemon spotlessCheck

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: java-test-reports
          path: '**/build/reports/tests/**'
          retention-days: 7

  # ---- Phase-0 smoke gate -----------------------------------------------------
  # Runs the Aeron Cluster + Archive round-trip tagged "phase0-smoke".
  # Separate job so Phase-0 regression is visible as its own check, not buried
  # inside the full allTests sweep. Runs on every branch + PR.
  phase0-smoke:
    name: Phase-0 smoke (Aeron Cluster + Archive)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/wrapper-validation@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}

      - name: Phase-0 smoke gate
        run: ./gradlew --no-daemon phase0Smoke

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: phase0-smoke-reports
          path: '**/build/reports/tests/phase0Smoke/**'
          retention-days: 7

  # ---- C++ CMake build --------------------------------------------------------
  cpp:
    name: C++ build + unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build g++-14

      - name: cmake configure
        run: cmake -S cpp -B build/cpp -G Ninja -DCMAKE_CXX_STANDARD=20 -DCMAKE_CXX_COMPILER=g++-14

      - name: cmake build
        run: cmake --build build/cpp

      - name: ctest
        run: ctest --test-dir build/cpp --output-on-failure

  # ---- Schema lint + reject-code catalog -------------------------------------
  schemas:
    name: Schema lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install -q yamllint
      - name: Lint FSM YAML
        run: 'yamllint -d "{rules: {line-length: {max: 200}, indentation: {spaces: 2}}}" schemas/fsm/ || true'
      - name: Lint SBE XML (xmllint)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
          find schemas/sbe -name '*.xml' -print0 \
            | xargs -0 -r -I{} xmllint --noout --schema schemas/sbe/sbe.xsd {} || true

  # ---- Shell lint ------------------------------------------------------------
  lint:
    name: Lint (shell)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          find scripts .githooks -type f \( -name '*.sh' -o -name '*.bash' \) -print0 \
            | xargs -0 -r shellcheck

  # SBOM + dependency-review job dropped for now. dependency-review-action
  # requires GitHub Advanced Security on private repos (free only on public),
  # so it would fail the first PR. Re-add when GHAS is enabled or the repo is
  # public; CycloneDX SBOM generation (anchore/sbom-action) can be restored
  # independently as it works on private repos.
