# Provisions the Copilot coding agent's ephemeral environment so it can build,
# test, AND run Spotless before it commits — the coding agent runs the job named
# `copilot-setup-steps` (this exact name is required) to set up its sandbox.
# https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent
name: Copilot setup steps

on:
  workflow_dispatch:
  # Run on changes to this file so you can verify the setup still works.
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read

jobs:
  # MUST be named exactly `copilot-setup-steps` for the coding agent to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # Warm the Gradle/Spotless caches so the agent's own `spotlessApply` is fast,
      # and prove the toolchain is present in the agent environment.
      - name: Warm build + verify Spotless is runnable
        run: |
          ./gradlew --no-daemon help -q
          ./gradlew --no-daemon spotlessCheck || true   # non-fatal here; just warms the cache
