# Standardized reject code catalog per arch-validator.md.
#
# Format: EMS-<CAT>-<NNNN> where CAT is one of the 7 canonical prefixes
# defined in 80_architecture/arch-validator.md:
#
#   SES  Session
#   REF  Reference data
#   PRM  Permission
#   ORD  Order
#   RTE  Route
#   AUT  Automation
#   CFG  Configuration  (see arch-configuration-service.md)
#
# Per arch-validator.md, codes are append-only — never removed, only marked
# `deprecated: true`. Adding a new code: pick the next NNNN within the
# category, write title + description, ensure admin_hint points at the
# admin who can resolve it.

reject_codes:

  # --- SES — Session layer -------------------------------------------------
  - { code: EMS-SES-1001, category: SES, severity: error, title: "Invalid credentials", description: "Logon (35=A) failed credential check.", admin_hint: "Talk to session admin." }
  - { code: EMS-SES-1002, category: SES, severity: error, title: "Session not found or expired", description: "Per-request session lookup failed: session ID unknown or already logged out.", admin_hint: "Talk to session admin." }
  - { code: EMS-SES-2001, category: SES, severity: error, title: "Sequence gap detected", description: "MsgSeqNum advances past expected next; cannot reconcile.", admin_hint: "Issue ResendRequest (35=2)." }
  - { code: EMS-SES-2002, category: SES, severity: error, title: "Sequence duplicate", description: "MsgSeqNum matches a prior message and PossDupFlag is not set." }
  - { code: EMS-SES-3001, category: SES, severity: error, title: "CompID mismatch", description: "SenderCompID or TargetCompID does not match the configured session." }
  - { code: EMS-SES-4001, category: SES, severity: error, title: "Heartbeat interval out of range", description: "HeartBtInt on logon outside 1-300 second window." }

  # --- REF — Reference data -----------------------------------------------
  - { code: EMS-REF-1001, category: REF, severity: error, title: "License denied", description: "Identifier-class access denied by license check (e.g. CUSIP read by non-licensed firm).", admin_hint: "Verify licensed_identifier_classes for this firm." }
  - { code: EMS-REF-2001, category: REF, severity: error, title: "Unknown FIGI", description: "FIGI not present in security master.", admin_hint: "Verify symbology onboarding for this instrument." }
  - { code: EMS-REF-2002, category: REF, severity: error, title: "Instrument inactive", description: "Instrument lifecycle_status is not ACTIVE (EXPIRED/MATURED/SUSPENDED/DEFAULTED)." }
  - { code: EMS-REF-2003, category: REF, severity: error, title: "Instrument version stale", description: "Order references an instrument version superseded by a corporate action." }
  - { code: EMS-REF-3001, category: REF, severity: error, title: "Calendar not loaded", description: "Required holiday calendar missing or stale for this asset/currency." }
  - { code: EMS-REF-3002, category: REF, severity: error, title: "Day count not recognized", description: "Day-count convention code not in reference data." }

  # --- PRM — Permission ---------------------------------------------------
  - { code: EMS-PRM-1001, category: PRM, severity: error, title: "User missing tag", description: "User does not have permission tag #{tag}.", admin_hint: "Talk to tag admin {tag_admin}." }
  - { code: EMS-PRM-1002, category: PRM, severity: error, title: "Desk not enabled", description: "User has tag #{tag} but desk {desk} is not granted.", admin_hint: "Talk to desk admin {desk_admin}." }
  - { code: EMS-PRM-1003, category: PRM, severity: error, title: "Firm not enabled", description: "Firm {firm} is not granted tag #{tag}.", admin_hint: "Talk to firm admin {firm_admin}." }
  - { code: EMS-PRM-1601, category: PRM, severity: error, title: "Cross-desk aggregator missing", description: "Cross-desk aggregation requires tag #cross-desk-aggregator." }
  - { code: EMS-PRM-2001, category: PRM, severity: error, title: "Counterparty not enabled", description: "Counterparty {cpty} not on the desk's enabled list." }
  - { code: EMS-PRM-3001, category: PRM, severity: error, title: "Override required", description: "Operation falls outside permission boundaries; tag #{override-tag} required to override." }

  # --- ORD — Order --------------------------------------------------------
  - { code: EMS-ORD-1001, category: ORD, severity: error, title: "Required field missing", description: "Required order field absent (Side / OrderQty / Symbol / OrdType)." }
  - { code: EMS-ORD-1014, category: ORD, severity: error, title: "Missing limit price", description: "OrdType=Limit but Price is absent." }
  - { code: EMS-ORD-2001, category: ORD, severity: error, title: "Quantity zero or negative", description: "OrderQty must be > 0." }
  - { code: EMS-ORD-2003, category: ORD, severity: error, title: "Quantity exceeds max", description: "OrderQty exceeds firm/desk/user notional or share cap." }
  - { code: EMS-ORD-2501, category: ORD, severity: error, title: "Amend not allowed", description: "Cannot amend qty/side after quote on this order (see two-step-approval, fxel)." }
  - { code: EMS-ORD-2502, category: ORD, severity: error, title: "Quote expired", description: "QuoteID expired; restage required." }
  - { code: EMS-ORD-3001, category: ORD, severity: error, title: "Order in terminal state", description: "Order is already Canceled/Rejected/Filled/Expired; cannot transition." }
  - { code: EMS-ORD-3002, category: ORD, severity: error, title: "Pending-amend in flight", description: "Cannot accept a second amend while an OrderCancelReplaceRequest is in Pending Replace." }
  - { code: EMS-ORD-3003, category: ORD, severity: error, title: "Order not in required state", description: "Operation requires a different order/package state (e.g. multileg dispatch requires READY; unaggregate requires no fills)." }
  - { code: EMS-ORD-4001, category: ORD, severity: error, title: "Order not found", description: "OrderID references an unknown or purged staged order; may have been purged after session logout.", admin_hint: "Verify orderId and session ownership." }

  # --- ORD — Multileg / Package (per arch-multileg) -----------------------
  - { code: EMS-ORD-4401, category: ORD, severity: error, title: "Multileg legs heterogeneous", description: "Legs heterogeneous in a mode that requires homogeneity (e.g. ALL_OR_NONE legs naming multiple venues)." }
  - { code: EMS-ORD-4402, category: ORD, severity: error, title: "Multileg package_id required", description: "package_id required for ALL_OR_NONE packages." }
  - { code: EMS-ORD-4403, category: ORD, severity: error, title: "Multileg sequence_policy invalid", description: "sequence_policy requires SEQUENCED mode, a known policy, and a compatible kind (spot_first: SWAP/DELTA_HEDGE/CUSTOM)." }
  - { code: EMS-ORD-4404, category: ORD, severity: error, title: "Multileg package malformed", description: "A multi-leg package requires at least 2 legs." }
  - { code: EMS-ORD-4405, category: ORD, severity: error, title: "Leg not found", description: "LegID references an unknown leg on this package." }
  - { code: EMS-ORD-4406, category: ORD, severity: error, title: "Leg not dispatched", description: "Leg has no route yet; dispatch the package first." }

  # --- ORD — Aggregation (per arch-aggregation) ---------------------------
  - { code: EMS-ORD-5001, category: ORD, severity: error, title: "Ineligible for aggregation", description: "Child order fails the aggregation eligibility predicate (instrument/side/TIF/state/availability); the failing predicate is named in the message." }
  - { code: EMS-ORD-5002, category: ORD, severity: error, title: "Rounding policy required", description: "Aggregation allocation rule requires an explicit rounding policy." }

  # --- RTE — Route --------------------------------------------------------
  - { code: EMS-RTE-1001, category: RTE, severity: error, title: "Venue not enabled for instrument", description: "Selected venue does not list/route the requested instrument." }
  - { code: EMS-RTE-1002, category: RTE, severity: error, title: "Venue not enabled for desk", description: "Desk has no enablement record for this venue." }
  - { code: EMS-RTE-1007, category: RTE, severity: error, title: "Route incompatible with aggregation", description: "Route/venue capabilities incompatible with the aggregation policy (e.g. venue cannot accept extend_aggregation size)." }
  - { code: EMS-RTE-2005, category: RTE, severity: error, title: "ClOrdID collision", description: "ClOrdID already used in this session within the dedup window." }
  - { code: EMS-RTE-3003, category: RTE, severity: warning, title: "Stale quote", description: "QuoteID timestamp older than staleness_threshold." }
  - { code: EMS-RTE-3008, category: RTE, severity: warning, title: "Replace throttled", description: "Cancel/Replace rate exceeds per-route cap; throttling." }
  - { code: EMS-RTE-4001, category: RTE, severity: error, title: "Order not found for routing", description: "OrderID references an unknown or purged staged order; cannot create route." }
  - { code: EMS-RTE-4002, category: RTE, severity: error, title: "Order not ready for routing", description: "Order sub-state is not READY or ROUTING; must call markReady() before routing." }
  - { code: EMS-RTE-4003, category: RTE, severity: error, title: "Route qty exceeds order remaining", description: "Requested route qty plus existing open route qty exceeds the order's leavesQty." }
  - { code: EMS-RTE-5001, category: RTE, severity: error, title: "Route not found", description: "RouteID references an unknown route; may have never been created in this session." }
  - { code: EMS-RTE-5002, category: RTE, severity: error, title: "Route event not applicable", description: "Route FSM cannot process this event in its current state (terminal or wrong state)." }

  # --- AUT — Automation ---------------------------------------------------
  - { code: EMS-AUT-1001, category: AUT, severity: error, title: "Rule scope mismatch", description: "Rule scope does not include the firing event's actor." }
  - { code: EMS-AUT-2001, category: AUT, severity: error, title: "Action not permitted for actor", description: "Rule-binder lacks the tag the rule action requires." }
  - { code: EMS-AUT-2010, category: AUT, severity: error, title: "Already approved", description: "Second approver lost the race; first approval already took effect." }
  - { code: EMS-AUT-3001, category: AUT, severity: error, title: "Rule references unknown target", description: "Rule action references an order/route ID that no longer exists." }

  # --- CFG — Configuration (per arch-configuration-service) --------------
  - { code: EMS-CFG-1001, category: CFG, severity: error, title: "Unknown config key", description: "Configuration key not registered in the schema." }
  - { code: EMS-CFG-1002, category: CFG, severity: error, title: "Type mismatch", description: "Proposed value type does not match the schema-registered type." }
  - { code: EMS-CFG-1003, category: CFG, severity: error, title: "Out-of-band value", description: "Proposed value falls outside schema-declared range." }
  - { code: EMS-CFG-1101, category: CFG, severity: error, title: "Author lacks scope tag", description: "Actor lacks #config-author-{scope} for this change." }
  - { code: EMS-CFG-1102, category: CFG, severity: error, title: "Approver lacks scope tag", description: "Actor lacks #config-approver-{scope} for this change." }
  - { code: EMS-CFG-1201, category: CFG, severity: error, title: "Self-approval not allowed", description: "Same identity proposed and approved; distinct identities required.", admin_hint: "Have a different qualified approver action this change." }
  - { code: EMS-CFG-1301, category: CFG, severity: error, title: "Outside maintenance window", description: "Change requires a maintenance window; currently outside it.", admin_hint: "Schedule within window or grant #config-approver-window-emergency." }
  - { code: EMS-CFG-1401, category: CFG, severity: error, title: "Delete forbidden", description: "Schema removal not permitted; archive with default_value instead." }
  - { code: EMS-CFG-1402, category: CFG, severity: error, title: "Archive without default", description: "Archived key must have a locked default_value for replay determinism." }

