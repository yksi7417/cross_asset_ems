# git-cliff configuration for the Cross-Asset EMS monorepo.
#
# Tera template syntax (https://keats.github.io/tera/docs/) — NOT Mustache.
# Generate with: ./scripts/release/gen-changelog.sh

[changelog]
header = """
# Changelog

All notable changes to this project. Generated from Conventional Commits.

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=8, end="") }})
{%- endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
    { message = "^feat",      group = "Features" },
    { message = "^fix",       group = "Bug Fixes" },
    { message = "^arch",      group = "Architecture" },
    { message = "^task",      group = "Implementation Tasks" },
    { message = "^impl",      group = "Implementation Tasks" },
    { message = "^test",      group = "Tests" },
    { message = "^docs",      group = "Documentation" },
    { message = "^glossary",  group = "Documentation" },
    { message = "^home",      group = "Documentation" },
    { message = "^notes",     group = "Documentation" },
    { message = "^index",     group = "Documentation" },
    { message = "^build",     group = "Build/CI" },
    { message = "^ci",        group = "Build/CI" },
    { message = "^style",     group = "Other" },
    { message = "^refactor",  group = "Other" },
    { message = "^perf",      group = "Other" },
    { message = "^chore",     group = "Other" },
    { message = "^venues",    group = "Other" },
    { message = "^revert",    group = "Other" },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
