name: CodeQL

# PARKED — manual-trigger only.
# CodeQL compiles and analyzes fine, but uploading results to GitHub code
# scanning requires GitHub Advanced Security, which is a paid feature on
# PRIVATE repos (free only on public repos). Without it, the analyze step
# fails at upload ("Code scanning is not enabled for this repository").
#
# To re-enable automatic scanning, do ONE of:
#   - make the repo public, or
#   - enable GitHub Advanced Security (Settings → Code security), then
#   - restore the push/pull_request/schedule triggers below:
#       push:        { branches: [main] }
#       pull_request:{ branches: [main] }
#       schedule:    [ { cron: '0 6 * * 1' } ]   # Mondays 06:00 UTC
on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]   # add 'c-cpp' once cpp/ modules have real source (task 1.7+)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: gradle/actions/setup-gradle@v6
        if: matrix.language == 'java-kotlin'

      - name: Build for CodeQL
        if: matrix.language == 'java-kotlin'
        # CodeQL traces this compile to build its analysis database. The
        # gradle-wrapper.jar is committed, so ./gradlew runs directly.
        run: ./gradlew --no-daemon assemble -x test

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
