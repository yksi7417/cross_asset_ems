name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]   # add 'c-cpp' once cpp/ modules have real source (task 1.7+)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: gradle/actions/setup-gradle@v4
        if: matrix.language == 'java-kotlin'
        with:
          gradle-version: '8.10'   # puts `gradle` on PATH to regenerate the wrapper

      - name: Build for CodeQL
        if: matrix.language == 'java-kotlin'
        # CodeQL traces this compile to build its analysis database. The
        # gradle-wrapper.jar is gitignored (absent in CI), so guard on the JAR
        # and regenerate it before invoking ./gradlew.
        run: |
          test -f gradle/wrapper/gradle-wrapper.jar || gradle wrapper --gradle-version=8.10
          chmod +x gradlew || true
          ./gradlew --no-daemon assemble -x test

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
