  - { code: EMS-ORD-6619, category: ORD, severity: warning, title: "ABS: Country of origination is on supported list", description: "The country of origination must be a valid ISO 3166-1 alpha-2 code and must be on the firm's supported jurisdictions list. Off-list countries trigger an enha..." }
  - { code: EMS-ORD-6620, category: ORD, severity: error, title: "ABS: Obligor count positive for granular pools", description: "For granular pool types (AUTO_LOAN, CREDIT_CARD, CONSUMER, SMB_LOAN), the obligor count must be > 0 and consistent with the implied average balance (original..." }
  - { code: EMS-ORD-6621, category: ORD, severity: warning, title: "ABS: Servicer advance within facility cap", description: "Total outstanding servicer advances (principal + interest + expenses) cannot exceed the deal's documented servicer_advance_cap. Most deals cap this at the le..." }
  - { code: EMS-ORD-6622, category: ORD, severity: warning, title: "ABS: Geographic concentration cap", description: "No single US state (or non-US region) may exceed the geographic concentration cap documented in the deal's concentration tests. Most prime US RMBS deals cap ..." }
