  - { code: EMS-ORD-6625, category: ORD, severity: warning, title: "ABS: Weighted average FICO in plausible range", description: "For consumer ABS pools that carry a weighted average FICO (or equivalent internal score), the value must be in the range [300, 850] and, for prime shelf prog..." }

