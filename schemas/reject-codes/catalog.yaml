# Standardized reject code catalog per arch-validator.md.
#
# Format: EMS-<CAT>-<NNNN> where CAT is one of the 7 canonical prefixes
# defined in 80_architecture/arch-validator.md:
#
#   SES  Session
#   REF  Reference data
#   PRM  Permission
#   ORD  Order
#   RTE  Route
#   AUT  Automation
#   CFG  Configuration  (see arch-configuration-service.md)
#
# Per arch-validator.md, codes are append-only — never removed, only marked
# `deprecated: true`. Adding a new code: pick the next NNNN within the
# category, write title + description, ensure admin_hint points at the
# admin who can resolve it.

reject_codes:

  # --- SES — Session layer -------------------------------------------------
  - { code: EMS-SES-1001, category: SES, severity: error, title: "Invalid credentials", description: "Logon (35=A) failed credential check.", admin_hint: "Talk to session admin." }
  - { code: EMS-SES-1002, category: SES, severity: error, title: "Session not found or expired", description: "Per-request session lookup failed: session ID unknown or already logged out.", admin_hint: "Talk to session admin." }
  - { code: EMS-SES-2001, category: SES, severity: error, title: "Sequence gap detected", description: "MsgSeqNum advances past expected next; cannot reconcile.", admin_hint: "Issue ResendRequest (35=2)." }
  - { code: EMS-SES-2002, category: SES, severity: error, title: "Sequence duplicate", description: "MsgSeqNum matches a prior message and PossDupFlag is not set." }
  - { code: EMS-SES-3001, category: SES, severity: error, title: "CompID mismatch", description: "SenderCompID or TargetCompID does not match the configured session." }
  - { code: EMS-SES-4001, category: SES, severity: error, title: "Heartbeat interval out of range", description: "HeartBtInt on logon outside 1-300 second window." }

  # --- REF — Reference data -----------------------------------------------
  - { code: EMS-REF-1001, category: REF, severity: error, title: "License denied", description: "Identifier-class access denied by license check (e.g. CUSIP read by non-licensed firm).", admin_hint: "Verify licensed_identifier_classes for this firm." }
  - { code: EMS-REF-2001, category: REF, severity: error, title: "Unknown FIGI", description: "FIGI not present in security master.", admin_hint: "Verify symbology onboarding for this instrument." }
  - { code: EMS-REF-2002, category: REF, severity: error, title: "Instrument inactive", description: "Instrument lifecycle_status is not ACTIVE (EXPIRED/MATURED/SUSPENDED/DEFAULTED)." }
  - { code: EMS-REF-2003, category: REF, severity: error, title: "Instrument version stale", description: "Order references an instrument version superseded by a corporate action." }
  - { code: EMS-REF-3001, category: REF, severity: error, title: "Calendar not loaded", description: "Required holiday calendar missing or stale for this asset/currency." }
  - { code: EMS-REF-3002, category: REF, severity: error, title: "Day count not recognized", description: "Day-count convention code not in reference data." }

  # --- PRM — Permission ---------------------------------------------------
  - { code: EMS-PRM-1001, category: PRM, severity: error, title: "User missing tag", description: "User does not have permission tag #{tag}.", admin_hint: "Talk to tag admin {tag_admin}." }
  - { code: EMS-PRM-1002, category: PRM, severity: error, title: "Desk not enabled", description: "User has tag #{tag} but desk {desk} is not granted.", admin_hint: "Talk to desk admin {desk_admin}." }
  - { code: EMS-PRM-1003, category: PRM, severity: error, title: "Firm not enabled", description: "Firm {firm} is not granted tag #{tag}.", admin_hint: "Talk to firm admin {firm_admin}." }
  - { code: EMS-PRM-1601, category: PRM, severity: error, title: "Cross-desk aggregator missing", description: "Cross-desk aggregation requires tag #cross-desk-aggregator." }
  - { code: EMS-PRM-2001, category: PRM, severity: error, title: "Counterparty not enabled", description: "Counterparty {cpty} not on the desk's enabled list." }
  - { code: EMS-PRM-3001, category: PRM, severity: error, title: "Override required", description: "Operation falls outside permission boundaries; tag #{override-tag} required to override." }

  # --- ORD — Order --------------------------------------------------------
  - { code: EMS-ORD-1001, category: ORD, severity: error, title: "Required field missing", description: "Required order field absent (Side / OrderQty / Symbol / OrdType)." }
  - { code: EMS-ORD-1014, category: ORD, severity: error, title: "Missing limit price", description: "OrdType=Limit but Price is absent." }
  - { code: EMS-ORD-2001, category: ORD, severity: error, title: "Quantity zero or negative", description: "OrderQty must be > 0." }
  - { code: EMS-ORD-2003, category: ORD, severity: error, title: "Quantity exceeds max", description: "OrderQty exceeds firm/desk/user notional or share cap." }

  # --- ORD — FX netting (per arch-fx-netting) ------------------------------
  - { code: EMS-ORD-2201, category: ORD, severity: error, title: "Post-net limit breach", description: "Netted parent failed post-net validation; children reverted un-netted." }
  - { code: EMS-ORD-2202, category: ORD, severity: error, title: "Heterogeneous value date", description: "Orders with different value dates cannot net (reserved for manual pair-netting; auto-bucketing isolates by date)." }
  - { code: EMS-ORD-2203, category: ORD, severity: error, title: "Net-to-zero blocked", description: "Bucket nets to zero residual but policy disallows net-to-zero internal booking." }
  - { code: EMS-ORD-2204, category: ORD, severity: warning, title: "PB isolation prevented netting", description: "Prime-broker isolation kept otherwise-matching orders in separate buckets (informational)." }
  - { code: EMS-ORD-2205, category: ORD, severity: warning, title: "PAC mismatch", description: "Pre-authorized counterparty isolation kept otherwise-matching orders in separate buckets (informational)." }
  - { code: EMS-ORD-2210, category: ORD, severity: error, title: "Cannot un-net", description: "Netting group has fills, internal-cross bookings, or a routed parent; un-netting is no longer possible." }
  - { code: EMS-ORD-2501, category: ORD, severity: error, title: "Amend not allowed", description: "Cannot amend qty/side after quote on this order (see two-step-approval, fxel)." }
  - { code: EMS-ORD-2502, category: ORD, severity: error, title: "Quote expired", description: "QuoteID expired; restage required." }
  - { code: EMS-ORD-2510, category: ORD, severity: error, title: "Duplicate ClOrdID", description: "ClOrdID already used on this session — per-domain duplicate detection (FIX session rules); a re-import with a new request_id does not re-stage the same client orders." }
  - { code: EMS-ORD-3001, category: ORD, severity: error, title: "Order in terminal state", description: "Order is already Canceled/Rejected/Filled/Expired; cannot transition." }
  - { code: EMS-ORD-3002, category: ORD, severity: error, title: "Pending-amend in flight", description: "Cannot accept a second amend while an OrderCancelReplaceRequest is in Pending Replace." }
  - { code: EMS-ORD-3003, category: ORD, severity: error, title: "Order not in required state", description: "Operation requires a different order/package state (e.g. multileg dispatch requires READY; unaggregate requires no fills)." }
  - { code: EMS-ORD-4001, category: ORD, severity: error, title: "Order not found", description: "OrderID references an unknown or purged staged order; may have been purged after session logout.", admin_hint: "Verify orderId and session ownership." }

  # --- ORD — Multileg / Package (per arch-multileg) -----------------------
  - { code: EMS-ORD-4401, category: ORD, severity: error, title: "Multileg legs heterogeneous", description: "Legs heterogeneous in a mode that requires homogeneity (e.g. ALL_OR_NONE legs naming multiple venues)." }
  - { code: EMS-ORD-4402, category: ORD, severity: error, title: "Multileg package_id required", description: "package_id required for ALL_OR_NONE packages." }
  - { code: EMS-ORD-4403, category: ORD, severity: error, title: "Multileg sequence_policy invalid", description: "sequence_policy requires SEQUENCED mode, a known policy, and a compatible kind (spot_first: SWAP/DELTA_HEDGE/CUSTOM)." }
  - { code: EMS-ORD-4404, category: ORD, severity: error, title: "Multileg package malformed", description: "A multi-leg package requires at least 2 legs." }
  - { code: EMS-ORD-4405, category: ORD, severity: error, title: "Leg not found", description: "LegID references an unknown leg on this package." }
  - { code: EMS-ORD-4406, category: ORD, severity: error, title: "Leg not dispatched", description: "Leg has no route yet; dispatch the package first." }

  # --- ORD — Aggregation (per arch-aggregation) ---------------------------
  - { code: EMS-ORD-5001, category: ORD, severity: error, title: "Ineligible for aggregation", description: "Child order fails the aggregation eligibility predicate (instrument/side/TIF/state/availability); the failing predicate is named in the message." }
  - { code: EMS-ORD-5002, category: ORD, severity: error, title: "Rounding policy required", description: "Aggregation allocation rule requires an explicit rounding policy." }

  # --- RTE — Route --------------------------------------------------------
  - { code: EMS-RTE-1001, category: RTE, severity: error, title: "Venue not enabled for instrument", description: "Selected venue does not list/route the requested instrument." }
  - { code: EMS-RTE-1002, category: RTE, severity: error, title: "Venue not enabled for desk", description: "Desk has no enablement record for this venue." }
  - { code: EMS-RTE-1007, category: RTE, severity: error, title: "Route incompatible with aggregation", description: "Route/venue capabilities incompatible with the aggregation policy (e.g. venue cannot accept extend_aggregation size)." }
  - { code: EMS-RTE-2005, category: RTE, severity: error, title: "ClOrdID collision", description: "ClOrdID already used in this session within the dedup window." }
  - { code: EMS-RTE-3003, category: RTE, severity: warning, title: "Stale quote", description: "QuoteID timestamp older than staleness_threshold." }
  - { code: EMS-RTE-3008, category: RTE, severity: warning, title: "Replace throttled", description: "Cancel/Replace rate exceeds per-route cap; throttling." }
  - { code: EMS-RTE-4001, category: RTE, severity: error, title: "Order not found for routing", description: "OrderID references an unknown or purged staged order; cannot create route." }
  - { code: EMS-RTE-4002, category: RTE, severity: error, title: "Order not ready for routing", description: "Order sub-state is not READY or ROUTING; must call markReady() before routing." }
  - { code: EMS-RTE-4003, category: RTE, severity: error, title: "Route qty exceeds order remaining", description: "Requested route qty plus existing open route qty exceeds the order's leavesQty." }
  - { code: EMS-RTE-5001, category: RTE, severity: error, title: "Route not found", description: "RouteID references an unknown route; may have never been created in this session." }
  - { code: EMS-RTE-5002, category: RTE, severity: error, title: "Route event not applicable", description: "Route FSM cannot process this event in its current state (terminal or wrong state)." }

  # --- AUT — Automation ---------------------------------------------------
  - { code: EMS-AUT-1001, category: AUT, severity: error, title: "Rule scope mismatch", description: "Rule scope does not include the firing event's actor." }
  - { code: EMS-AUT-2001, category: AUT, severity: error, title: "Action not permitted for actor", description: "Rule-binder lacks the tag the rule action requires." }
  - { code: EMS-AUT-2010, category: AUT, severity: error, title: "Already approved", description: "Second approver lost the race; first approval already took effect." }
  - { code: EMS-AUT-3001, category: AUT, severity: error, title: "Rule references unknown target", description: "Rule action references an order/route ID that no longer exists." }

  # --- Kill switch (task 18.4, control path) ------------------------------
  - { code: EMS-ORD-9601, category: ORD, severity: error, title: "Kill switch engaged — order entry locked", description: "A kill switch covering this firm/desk is engaged; staging and mark-ready are locked out until release. Cancels remain allowed." }
  - { code: EMS-RTE-9601, category: RTE, severity: error, title: "Kill switch engaged — routing locked", description: "A kill switch covering this firm/desk/venue is engaged; new routes are locked out until release. Route cancels remain allowed." }
  - { code: EMS-AUT-9601, category: AUT, severity: error, title: "Kill switch permission required", description: "Engaging or releasing a kill switch requires the #kill-switch tag.", admin_hint: "Request the #kill-switch tag from the desk supervisor." }
  - { code: EMS-AUT-9602, category: AUT, severity: error, title: "Kill scope state conflict", description: "Engage of an already-engaged scope, or release of a scope that is not engaged." }

  # --- CFG — Configuration (per arch-configuration-service) --------------
  - { code: EMS-CFG-1001, category: CFG, severity: error, title: "Unknown config key", description: "Configuration key not registered in the schema." }
  - { code: EMS-CFG-1002, category: CFG, severity: error, title: "Type mismatch", description: "Proposed value type does not match the schema-registered type." }
  - { code: EMS-CFG-1003, category: CFG, severity: error, title: "Out-of-band value", description: "Proposed value falls outside schema-declared range." }
  - { code: EMS-CFG-1101, category: CFG, severity: error, title: "Author lacks scope tag", description: "Actor lacks #config-author-{scope} for this change." }
  - { code: EMS-CFG-1102, category: CFG, severity: error, title: "Approver lacks scope tag", description: "Actor lacks #config-approver-{scope} for this change." }
  - { code: EMS-CFG-1201, category: CFG, severity: error, title: "Self-approval not allowed", description: "Same identity proposed and approved; distinct identities required.", admin_hint: "Have a different qualified approver action this change." }
  - { code: EMS-CFG-1301, category: CFG, severity: error, title: "Outside maintenance window", description: "Change requires a maintenance window; currently outside it.", admin_hint: "Schedule within window or grant #config-approver-window-emergency." }
  - { code: EMS-CFG-1401, category: CFG, severity: error, title: "Delete forbidden", description: "Schema removal not permitted; archive with default_value instead." }
  - { code: EMS-CFG-1402, category: CFG, severity: error, title: "Archive without default", description: "Archived key must have a locked default_value for replay determinism." }

  # --- ORD 6xxx — Per-asset-class validation rules (task 6.4) ---------------
  # One 100-block per asset class; codes generated from schemas/validator-rules/*.yaml
  # (equity 60xx, bond 61xx, fx 62xx, derivative 63xx, commodity 64xx, crypto 65xx,
  #  abs 66xx, loan 67xx). Append-only like every other range.
  - { code: EMS-ORD-6001, category: ORD, severity: error, title: "EQUITY: Ticker format", description: "Ticker symbol must be 1-12 uppercase alphanumeric characters; class-share dots are permitted only on exchanges that allow them." }
  - { code: EMS-ORD-6002, category: ORD, severity: error, title: "EQUITY: Figi format", description: "FIGI must be a 12-character BSID; check digit must validate per ISO 18774." }
  - { code: EMS-ORD-6003, category: ORD, severity: error, title: "EQUITY: Isin format", description: "ISIN must be 12 characters: 2-letter ISO 3166-1 country code, 9 alphanumerics, 1 numeric Luhn check digit (per ISO 6166)." }
  - { code: EMS-ORD-6004, category: ORD, severity: error, title: "EQUITY: Cusip format", description: "CUSIP must be 9 characters with a valid Mod-10 check digit issued by CUSIP Global Services." }
  - { code: EMS-ORD-6005, category: ORD, severity: warning, title: "EQUITY: Sedol format", description: "SEDOL must be 7 characters with a valid check digit (only required when instrument is GB or IE listed)." }
  - { code: EMS-ORD-6006, category: ORD, severity: error, title: "EQUITY: Mic valid", description: "Exchange MIC must be a registered ISO 10383 Market Identifier Code that is currently 'active' or 'open' in the ALMIC table." }
  - { code: EMS-ORD-6007, category: ORD, severity: error, title: "EQUITY: Currency iso valid", description: "Instrument currency must be a registered ISO 4217 active currency code." }
  - { code: EMS-ORD-6008, category: ORD, severity: error, title: "EQUITY: Tick size positive", description: "Tick size must be a positive decimal drawn from the venue's published tick table." }
  - { code: EMS-ORD-6009, category: ORD, severity: error, title: "EQUITY: Lot size positive", description: "Round-lot size must be a positive integer; odd-lot flag must be set when below round-lot." }
  - { code: EMS-ORD-6010, category: ORD, severity: error, title: "EQUITY: Market hours set", description: "Either both market_open_time and market_close_time are populated, or both are null (for 24-hour venues)." }
  - { code: EMS-ORD-6011, category: ORD, severity: error, title: "EQUITY: Market open before close", description: "market_open_time must strictly precede market_close_time on the same trading day." }
  - { code: EMS-ORD-6012, category: ORD, severity: error, title: "EQUITY: Price within tick", description: "Limit/stop price must be a multiple of tick_size for the security on this venue." }
  - { code: EMS-ORD-6013, category: ORD, severity: error, title: "EQUITY: Price positive limit", description: "Limit price must be strictly positive on long-orders and strictly negative for short instructions." }
  - { code: EMS-ORD-6014, category: ORD, severity: error, title: "EQUITY: Ticker figi consistent", description: "Ticker and FIGI must resolve to the same security in the issuer master table; mismatch is a hard reject." }
  - { code: EMS-ORD-6015, category: ORD, severity: error, title: "EQUITY: Isin cusip consistent", description: "When both ISIN and CUSIP are present, the derived CUSIP must equal the cusip field (first 9 chars of ISIN-base)." }
  - { code: EMS-ORD-6016, category: ORD, severity: error, title: "EQUITY: Security status active", description: "Security status must be 'active' in the venue reference snapshot at order entry time." }
  - { code: EMS-ORD-6017, category: ORD, severity: error, title: "EQUITY: Corporate action block", description: "Block new orders when an ex-date corporate action is scheduled within the settlement window of the order." }
  - { code: EMS-ORD-6018, category: ORD, severity: error, title: "EQUITY: Settlement type valid", description: "Settlement type must be supported by the exchange (T+1, T+2, T+3, cash, SDF) and consistent with the security's market." }
  - { code: EMS-ORD-6019, category: ORD, severity: error, title: "EQUITY: Trade date business day", description: "Trade date must be a valid business day on the instrument's primary exchange." }
  - { code: EMS-ORD-6020, category: ORD, severity: error, title: "EQUITY: Luld band check", description: "Order price must be within the Limit-Up/Limit-Down band published by the primary listing exchange (state error if breached)." }
  - { code: EMS-ORD-6021, category: ORD, severity: error, title: "EQUITY: Min qty enforced", description: "Order quantity must meet the venue's minimum fill quantity, or 'all-or-none' must be set." }
  - { code: EMS-ORD-6022, category: ORD, severity: warning, title: "EQUITY: Isin country exchange", description: "ISIN country code should match the primary listing exchange's domicile; mismatch is a warning." }
  - { code: EMS-ORD-6023, category: ORD, severity: error, title: "EQUITY: Delisted security block", description: "Block orders for securities whose delist_date is in the past (state condition error)." }
  - { code: EMS-ORD-6024, category: ORD, severity: error, title: "EQUITY: Short marking required", description: "Short-sale orders must carry a locate_source and a locate_timestamp within the locate window." }
  - { code: EMS-ORD-6025, category: ORD, severity: error, title: "EQUITY: Auction session hours", description: "Auction orders (MOC, LOC, OPO) must be within the venue's auction acceptance window." }
  - { code: EMS-ORD-6101, category: ORD, severity: error, title: "BOND: Isin format", description: "ISIN must be 12 characters and pass Luhn check (sourced from CSD or ICMA reference)." }
  - { code: EMS-ORD-6102, category: ORD, severity: error, title: "BOND: Coupon non negative", description: "Coupon (annual) must be a non-negative decimal; zero-coupon is valid only when coupon_type == 'zero'." }
  - { code: EMS-ORD-6103, category: ORD, severity: warning, title: "BOND: Coupon within market", description: "Coupon should be within 0–25% for investment-grade and 0–50% for HY/EM; outside this is a warning." }
  - { code: EMS-ORD-6104, category: ORD, severity: error, title: "BOND: Coupon frequency valid", description: "Coupon frequency must be one of the standard values: 1, 2, 4, 12 (annual, semi, quarterly, monthly) per ICMA conventions." }
  - { code: EMS-ORD-6105, category: ORD, severity: error, title: "BOND: Day count convention valid", description: "Day count convention must be an ISDA-standard: ACT/360, ACT/365, ACT/ACT, 30/360, 30E/360, ACT/ACT-ICMA, ACT/ACT-ISDA." }
  - { code: EMS-ORD-6106, category: ORD, severity: error, title: "BOND: Issue before maturity", description: "issue_date must strictly precede maturity_date; same-day is permitted only for tap issues." }
  - { code: EMS-ORD-6107, category: ORD, severity: error, title: "BOND: Tenor positive", description: "Tenor (maturity - issue, in years) must be between 1 day and 100 years; perpetual needs perp_flag." }
  - { code: EMS-ORD-6108, category: ORD, severity: error, title: "BOND: Face value positive", description: "face_value (denomination) must be positive and aligned to currency standards (1k for USD, 100k for JGB, 1k for EUR corporate)." }
  - { code: EMS-ORD-6109, category: ORD, severity: error, title: "BOND: Seniority consistent", description: "Seniority ranking must be one of {senior_secured, senior_unsecured, subordinated, junior_sub, mezzanine, equity_linked} and not conflict with coupon type." }
  - { code: EMS-ORD-6110, category: ORD, severity: warning, title: "BOND: Rating present", description: "At least one external rating (SP/Moody/Fitch) must be populated for any non-sovereign, non-144A bond." }
  - { code: EMS-ORD-6111, category: ORD, severity: warning, title: "BOND: Rating freshness", description: "Rating timestamps must be within the last 18 months for actively traded issues; older ratings emit a warning." }
  - { code: EMS-ORD-6112, category: ORD, severity: error, title: "BOND: Call schedule valid", description: "When call_schedule is present, the first call date must be on or after issue_date, monotonically increasing, and make-whole fields must be consistent." }
  - { code: EMS-ORD-6113, category: ORD, severity: error, title: "BOND: Put schedule valid", description: "When put_schedule is present, dates must be monotonically increasing and on coupon payment dates." }
  - { code: EMS-ORD-6114, category: ORD, severity: error, title: "BOND: Accrual dates aligned", description: "Accrual start_date and end_date must bracket trade_date; accrual_end must equal next coupon_date." }
  - { code: EMS-ORD-6115, category: ORD, severity: warning, title: "BOND: Day count matches market", description: "Day count convention must match the market convention for the currency (30E/360 for EUR, ACT/ACT for US Treasuries, etc.)." }
  - { code: EMS-ORD-6116, category: ORD, severity: error, title: "BOND: Settlement t plus standards", description: "Settlement cycle must be T+1 (US treasuries + corporates from May 2024) or T+2 (most other markets) unless explicitly overridden." }
  - { code: EMS-ORD-6117, category: ORD, severity: error, title: "BOND: Yield computable", description: "YTM and clean price must be cross-consistent: given clean_price, face, coupon, and maturity, the recomputed YTM must match the yield field within 1bp." }
  - { code: EMS-ORD-6118, category: ORD, severity: warning, title: "BOND: Accrued interest non negative", description: "Accrued interest must be non-negative; negative accrual is only valid for ex-coupon trades and requires ex_coupon_flag." }
  - { code: EMS-ORD-6119, category: ORD, severity: error, title: "BOND: Dirty price equals clean plus accrued", description: "dirty_price must equal clean_price + accrued_interest within half a tick." }
  - { code: EMS-ORD-6120, category: ORD, severity: error, title: "BOND: Sinking fund valid", description: "When sinking_fund_flag is true, schedule dates must align with coupon dates and total sink cannot exceed face value." }
  - { code: EMS-ORD-6121, category: ORD, severity: error, title: "BOND: Structured coupon components", description: "Structured (inverse-floater, range-accrual, etc.) bonds must have component legs or a structured_template_id." }
  - { code: EMS-ORD-6122, category: ORD, severity: error, title: "BOND: Tax withholding flag", description: "WH tax flag and treaty rate must be present for cross-border bonds; domestic trades default to 0." }
  - { code: EMS-ORD-6123, category: ORD, severity: error, title: "BOND: Isin cusip consistent", description: "When both ISIN and CUSIP are present, the embedded CUSIP must match." }
  - { code: EMS-ORD-6124, category: ORD, severity: error, title: "BOND: Floating index valid", description: "Floating-rate bonds must reference a valid benchmark (SOFR, EURIBOR, SONIA, TONAR, etc.) and a known tenor." }
  - { code: EMS-ORD-6125, category: ORD, severity: error, title: "BOND: Spread within band", description: "Quoted spread (over benchmark) for a FRN should be between -500 and +1500 bps; outside this is a hard reject." }
  - { code: EMS-ORD-6126, category: ORD, severity: error, title: "BOND: Maturity market holiday", description: "Maturity date that falls on a non-business day in the issuer's primary market must be rolled per Following/Bond-Basis." }
  - { code: EMS-ORD-6127, category: ORD, severity: error, title: "BOND: Outstanding face positive", description: "Outstanding face (amount_outstanding) must be positive and not exceed issue size." }
  - { code: EMS-ORD-6128, category: ORD, severity: warning, title: "BOND: Callable only above par", description: "Call prices for non-make-whole calls must be >= par (100); make-whole calls must specify benchmark and spread." }
  - { code: EMS-ORD-6129, category: ORD, severity: error, title: "BOND: Cpn roll convention", description: "Coupon payment business-day convention must be one of {Following, Modified Following, Preceding, Unadjusted, End-of-Month}." }
  - { code: EMS-ORD-6130, category: ORD, severity: error, title: "BOND: Reference entity consistency", description: "Single-name CDS-referenced bonds and their underlying reference entity must share the RED code and seniority." }
  - { code: EMS-ORD-6201, category: ORD, severity: error, title: "FX: Ccy pair valid", description: "base_ccy and quote_ccy must be different ISO 4217 codes; identical pairs are invalid." }
  - { code: EMS-ORD-6202, category: ORD, severity: error, title: "FX: Pair not blocked", description: "Currency pair must not be in the desk's blocked-pairs list (e.g., sanctions, NDF-only)." }
  - { code: EMS-ORD-6203, category: ORD, severity: error, title: "FX: Tenor within limits", description: "Tenor (value_date - trade_date) must be within {spot, 1W, 1M, 3M, 6M, 1Y, 2Y} for deliverable forwards unless overridden." }
  - { code: EMS-ORD-6204, category: ORD, severity: error, title: "FX: Value date business day", description: "value_date must be a valid business day in both currency calendars; TOM/SPOT computed from trade_date." }
  - { code: EMS-ORD-6205, category: ORD, severity: error, title: "FX: Ndf fixing source", description: "Non-deliverable forwards must specify a fixing_source on the approved list (e.g., BFIX, WM/Refinitiv, RBI, etc.)." }
  - { code: EMS-ORD-6206, category: ORD, severity: error, title: "FX: Ndf fixing date", description: "NDF fixing_date must equal value_date for 'fixing at maturity' and value_date - 2BD for 'fixing 2BD before' conventions." }
  - { code: EMS-ORD-6207, category: ORD, severity: error, title: "FX: Ndf eligibility", description: "NDF product is permitted only for currencies on the NDF-eligible list (CNY, INR, KRW, BRL, TWD, RUB historical, etc.)." }
  - { code: EMS-ORD-6208, category: ORD, severity: error, title: "FX: Spot value date aligned", description: "SPOT value_date must be T+1 (USD/CAD/EUR/GBP) or T+2 (rest) per CLS calendar; reject misalignments." }
  - { code: EMS-ORD-6209, category: ORD, severity: error, title: "FX: Pip precision", description: "Quoted price precision must be 4 decimals for JPY pairs and 4 for most pairs (5 for FX swaps)." }
  - { code: EMS-ORD-6210, category: ORD, severity: error, title: "FX: Notional positive", description: "Trade notional in base_ccy must be a positive multiple of 1M for institutional flow; sub-1M is allowed for retail." }
  - { code: EMS-ORD-6211, category: ORD, severity: error, title: "FX: Cut off time", description: "Trade must be received before the venue's cut-off for the tenor (typically 17:00 NY for spot, 16:00 for forwards)." }
  - { code: EMS-ORD-6212, category: ORD, severity: error, title: "FX: Fixing offset positive", description: "NDF fixing offset from value_date must be 0, 1, or 2 business days." }
  - { code: EMS-ORD-6213, category: ORD, severity: error, title: "FX: Ccy pair product", description: "Product type must be valid for the pair (e.g., NDF only for restricted pairs, NDS only for major pairs)." }
  - { code: EMS-ORD-6214, category: ORD, severity: error, title: "FX: Swap near far leg", description: "FX swap must have two legs with opposite signs, value_date_near < value_date_far, and consistent notionals." }
  - { code: EMS-ORD-6215, category: ORD, severity: error, title: "FX: Nondeliverable ccy for ndf only", description: "If deliverable is false, the quote_ccy must be in the NDF set; if true, must NOT be in the NDF set." }
  - { code: EMS-ORD-6216, category: ORD, severity: error, title: "FX: Fixing source rating", description: "For sanctioned-jurisdiction currencies, fixing_source must be from an independent vendor (not a state source)." }
  - { code: EMS-ORD-6217, category: ORD, severity: error, title: "FX: Option strike positive", description: "FX option strike must be positive; barrier level must be on correct side of spot at trade time." }
  - { code: EMS-ORD-6218, category: ORD, severity: error, title: "FX: Notional currency consistent", description: "Notional currency must equal the product's base or quote per convention; reject otherwise." }
  - { code: EMS-ORD-6219, category: ORD, severity: error, title: "FX: Delivery date business day both", description: "value_date must be a CLS-eligible settlement day for BOTH currencies; reject non-CLS days." }
  - { code: EMS-ORD-6220, category: ORD, severity: warning, title: "FX: Forward points within band", description: "Forward points (in pips) must be within ±3× the historical 30-day standard deviation for the tenor." }
  - { code: EMS-ORD-6301, category: ORD, severity: error, title: "DERIVATIVE: Underlying exists", description: "Underlying instrument must resolve in the reference data store and have status 'active'." }
  - { code: EMS-ORD-6302, category: ORD, severity: error, title: "DERIVATIVE: Strike positive", description: "Strike price must be positive for all single-name options and structured products." }
  - { code: EMS-ORD-6303, category: ORD, severity: error, title: "DERIVATIVE: Expiry after trade date", description: "expiry must be strictly after trade_date; same-day expiry only for 'daily' options on the underlying." }
  - { code: EMS-ORD-6304, category: ORD, severity: error, title: "DERIVATIVE: Exercise style valid", description: "exercise_style must be one of {American, European, Bermuda, Asian, Compound} and supported for this product." }
  - { code: EMS-ORD-6305, category: ORD, severity: error, title: "DERIVATIVE: Option type valid", description: "option_type must be 'call' or 'put' for vanilla; 'binary_call'/'binary_put' for digitals." }
  - { code: EMS-ORD-6306, category: ORD, severity: error, title: "DERIVATIVE: Contract size positive", description: "contract_size (multiplier) must be positive; for listed futures, must match the exchange specification." }
  - { code: EMS-ORD-6307, category: ORD, severity: error, title: "DERIVATIVE: Settlement type valid", description: "settlement_type must be {Cash, Physical, CashPhysicalOptional} and supported by the venue." }
  - { code: EMS-ORD-6308, category: ORD, severity: warning, title: "DERIVATIVE: Premium positive", description: "Premium (option price) must be non-negative; zero is permitted for gratuitous options but flagged." }
  - { code: EMS-ORD-6309, category: ORD, severity: error, title: "DERIVATIVE: Barrier consistency", description: "Barrier level must be on the correct side of strike; double barrier levels must be ordered." }
  - { code: EMS-ORD-6310, category: ORD, severity: error, title: "DERIVATIVE: Irs leg consistency", description: "IRS must have exactly two legs: one fixed (rate, day count, freq) and one floating (index, tenor, freq)." }
  - { code: EMS-ORD-6311, category: ORD, severity: error, title: "DERIVATIVE: Irs leg same notional", description: "Both IRS legs must have identical notional, currency, and effective_date; mismatches are rejects." }
  - { code: EMS-ORD-6312, category: ORD, severity: error, title: "DERIVATIVE: Irs pay freq valid", description: "Pay frequency for each leg must be one of {1M, 3M, 6M, 12M} (in months); non-standard requires a structured flag." }
  - { code: EMS-ORD-6313, category: ORD, severity: error, title: "DERIVATIVE: Irs float index valid", description: "Floating leg index must be a supported RFR or legacy IBOR with fallback to compounded RFR." }
  - { code: EMS-ORD-6314, category: ORD, severity: error, title: "DERIVATIVE: Cds reference entity valid", description: "CDS reference entity must resolve in the RED database; senior unsecured must match the standard." }
  - { code: EMS-ORD-6315, category: ORD, severity: error, title: "DERIVATIVE: Cds spread positive", description: "CDS spread (running coupon) must be positive and within the par-rate band (5-1500bps for HY, 1-300 for IG)." }
  - { code: EMS-ORD-6316, category: ORD, severity: error, title: "DERIVATIVE: Cds recovery in band", description: "CDS recovery rate assumption must be in [0.0, 0.8]; standard is 0.4 for senior unsecured." }
  - { code: EMS-ORD-6317, category: ORD, severity: error, title: "DERIVATIVE: Cds maturity aligned", description: "CDS maturity must be one of the standard tenors: 3M, 6M, 1Y, 2Y, 3Y, 4Y, 5Y, 7Y, 10Y, 20Y, 30Y." }
  - { code: EMS-ORD-6318, category: ORD, severity: error, title: "DERIVATIVE: Future expiry spec match", description: "Listed future expiry must be a contract code that exists in the exchange spec (e.g., ESZ5 = Dec 2025)." }
  - { code: EMS-ORD-6319, category: ORD, severity: error, title: "DERIVATIVE: Listed option monthly weekly", description: "Listed option series must follow the venue's monthly/weekly/daily symbol convention." }
  - { code: EMS-ORD-6320, category: ORD, severity: error, title: "DERIVATIVE: Fx option premium currency", description: "FX vanilla option premium must be quoted in either base_ccy or quote_ccy, not a third currency." }
  - { code: EMS-ORD-6321, category: ORD, severity: error, title: "DERIVATIVE: Swaption expiry before swap", description: "Swaption expiry must be strictly before the underlying swap's start_date (typically start-1BD or exercise lag)." }
  - { code: EMS-ORD-6322, category: ORD, severity: error, title: "DERIVATIVE: Cap floor strike aligned", description: "Cap/floor strike must match one of the strike levels available on the strike ladder." }
  - { code: EMS-ORD-6323, category: ORD, severity: error, title: "DERIVATIVE: Structured payoff legs", description: "Structured product (autocall, reverse-convertible, etc.) must have a payoff_template_id and matching leg count." }
  - { code: EMS-ORD-6324, category: ORD, severity: error, title: "DERIVATIVE: Structured payoff dates consistent", description: "Observation, barrier, and coupon dates in a structured product must be strictly ordered." }
  - { code: EMS-ORD-6325, category: ORD, severity: error, title: "DERIVATIVE: Listed option underlying index", description: "For index options, the underlying must be a known index (SPX, NDX, VIX, etc.), not a basket of single names." }
  - { code: EMS-ORD-6326, category: ORD, severity: error, title: "DERIVATIVE: Variance swap vega cap", description: "Variance swap vega notional must be in USD-equivalent millions; strike must be within 5-150 vol points." }
  - { code: EMS-ORD-6327, category: ORD, severity: error, title: "DERIVATIVE: Quanto currency consistency", description: "Quanto option's underlying ccy must differ from the settlement ccy; both must be valid." }
  - { code: EMS-ORD-6328, category: ORD, severity: warning, title: "DERIVATIVE: Trade date imm roll", description: "CDS and IRS with IMM roll (3rd Wednesday) must have a valid IMM date; reject on non-IMM for IMM-only products." }
  - { code: EMS-ORD-6329, category: ORD, severity: error, title: "DERIVATIVE: Cds pay freq standard", description: "CDS payment frequency must be quarterly (3M) for standard; monthly for trade-date credit events." }
  - { code: EMS-ORD-6330, category: ORD, severity: error, title: "DERIVATIVE: Barrier breach window", description: "When barrier_window is specified (e.g., 'continuous', 'daily_close', 'first 30 days'), it must be a known value." }
  - { code: EMS-ORD-6331, category: ORD, severity: error, title: "DERIVATIVE: Fx option cutoff", description: "FX option expiry must cut off at NY 10:00 (or the agreed cut-off) for same-day expiry; otherwise must be TOM." }
  - { code: EMS-ORD-6332, category: ORD, severity: error, title: "DERIVATIVE: Calendar spread offsets", description: "Calendar spread orders on futures must have legs with distinct contract_codes and aligned underlying." }
  - { code: EMS-ORD-6333, category: ORD, severity: warning, title: "DERIVATIVE: Position limit warning", description: "Open interest in a contract must be >0 and total contracts held must be < position limit for the trader." }
  - { code: EMS-ORD-6334, category: ORD, severity: error, title: "DERIVATIVE: Corporate action adjustment", description: "For single-stock derivatives, an upcoming corporate action must adjust the contract terms (or block)." }
  - { code: EMS-ORD-6335, category: ORD, severity: error, title: "DERIVATIVE: Cdx index membership", description: "For CDX/iTraxx index trades, the index must be a recognized series and the entity must be a current member." }
  - { code: EMS-ORD-6401, category: ORD, severity: error, title: "COMMODITY: Unit of measure valid", description: "unit_of_measure must be one of the standard codes: BBL, MT, OZ, BU, GAL, MMBTU, LB, KG, etc." }
  - { code: EMS-ORD-6402, category: ORD, severity: error, title: "COMMODITY: Contract size positive", description: "contract_size (qty per contract) must be positive and match the exchange specification." }
  - { code: EMS-ORD-6403, category: ORD, severity: error, title: "COMMODITY: Delivery location valid", description: "delivery_location must resolve to a recognized hub/warehouse/port from the exchange's licensed list." }
  - { code: EMS-ORD-6404, category: ORD, severity: error, title: "COMMODITY: Quality grade specified", description: "quality_grade must be specified for physical commodities (e.g., WTI sulfur 0.42%, Brent 0.37%, etc.)." }
  - { code: EMS-ORD-6405, category: ORD, severity: error, title: "COMMODITY: Contract expiry spec match", description: "contract_code must match an active expiry month/year for the product on the given venue." }
  - { code: EMS-ORD-6406, category: ORD, severity: error, title: "COMMODITY: Last trade date valid", description: "last_trade_date must be in the future at order entry and precede delivery by the exchange-defined notice period." }
  - { code: EMS-ORD-6407, category: ORD, severity: error, title: "COMMODITY: Tick size standard", description: "tick_size must be one of the venue's published minimum increments (e.g., CL = 0.01, GC = 0.10)." }
  - { code: EMS-ORD-6408, category: ORD, severity: error, title: "COMMODITY: Price within tick", description: "Order price must be a multiple of tick_size for the commodity/venue combination." }
  - { code: EMS-ORD-6409, category: ORD, severity: error, title: "COMMODITY: Currency quote match", description: "Quoted currency must match the product's settlement ccy (USD for most, EUR for Eurex wheat, etc.)." }
  - { code: EMS-ORD-6410, category: ORD, severity: error, title: "COMMODITY: Warehouse receipt required", description: "For physical delivery, warehouse_receipt_id or warrant_id must be supplied for in-warehouse trades." }
  - { code: EMS-ORD-6411, category: ORD, severity: error, title: "COMMODITY: Lme prompt date valid", description: "For LME metals, prompt_date must be one of: cash, tomorrow, cash+3, weekly (Wed 1-5), monthly (3rd Wed)." }
