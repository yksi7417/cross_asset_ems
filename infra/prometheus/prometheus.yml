# Dev Prometheus scrape config.
#
# Production config lives in infra/k8s/prometheus/ (added in task 14.x).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: ems-services
    # Service discovery for the EMS services will land alongside each
    # service's containerization. Until then, list scrape targets here as
    # services come up in dev.
    static_configs:
      - targets: []   # populated per task in phases 4-12

  # Aeron driver / cluster metrics arrive via OTel collector at
  # otel-collector:8888 — no direct scrape needed.
