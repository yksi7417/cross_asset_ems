<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMS — Trader Desktop</title>
    <style>
      :root {
        --bg: #0b0e13;
        --panel: #11151d;
        --edge: #1d2433;
        --text: #c9d4e3;
        --muted: #5c6b82;
        --accent: #3fb68b;
        --warn: #e0a23f;
        --down: #d9534f;
        font-size: 13px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 6px;
        padding: 6px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 6px 12px;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 4px;
      }
      header h1 {
        font-size: 13px;
        letter-spacing: 0.18em;
        margin: 0;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
      }
      header .desk {
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      header .spacer {
        flex: 1;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 10px;
        border: 1px solid var(--edge);
        border-radius: 10px;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.06em;
      }
      .chip i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
      }
      .chip.live i {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
      }
      .chip.reconnecting i {
        background: var(--warn);
      }
      .chip.down i {
        background: var(--down);
      }
      main {
        flex: 1;
        display: flex;
        gap: 6px;
        min-height: 0;
      }
      #left-col {
        width: 330px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 0;
      }
      #right-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }
      #watchlist-panel {
        flex: 1;
      }
      /* Ticket form */
      #ticket {
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
      }
      #ticket label,
      .tk-sep {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .tk-sep {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--edge);
      }
      #ticket input,
      #ticket select {
        background: var(--bg);
        border: 1px solid var(--edge);
        border-radius: 3px;
        color: var(--text);
        padding: 6px 8px;
        font-family: inherit;
        font-size: 12px;
        width: 100%;
      }
      .tk-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .tk-inst {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 11px;
        color: var(--accent);
        min-height: 14px;
      }
      .tk-inst #tk-hint {
        color: var(--muted);
      }
      .tk-actions {
        display: flex;
        gap: 6px;
        align-items: end;
      }
      #ticket button {
        background: var(--edge);
        color: var(--text);
        border: none;
        border-radius: 3px;
        padding: 7px 10px;
        letter-spacing: 0.08em;
        font-size: 11px;
        cursor: pointer;
        flex: 1;
      }
      #ticket button.primary {
        background: var(--accent);
        color: #06281d;
        font-weight: 600;
      }
      #ticket button.danger {
        background: #4a2326;
        color: #e8a9a6;
      }
      #tk-feedback,
      #tk-result {
        font-size: 11px;
        margin: 0;
        min-height: 14px;
        word-break: break-word;
      }
      #tk-feedback.ok,
      #tk-result.ok {
        color: var(--accent);
      }
      #tk-feedback.err,
      #tk-result.err,
      #bk-result.err {
        color: var(--down);
      }
      #tk-feedback.ok,
      #tk-result.ok,
      #bk-result.ok {
        color: var(--accent);
      }
      #bk-result {
        font-size: 11px;
        margin: 0;
        min-height: 14px;
        word-break: break-word;
      }
      #ticket input[type="file"] {
        padding: 3px;
        font-size: 10px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 4px;
        min-height: 0;
        overflow: hidden;
      }
      .panel > h2 {
        margin: 0;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: var(--muted);
        border-bottom: 1px solid var(--edge);
      }
      .panel > perspective-viewer {
        flex: 1;
        min-height: 0;
      }
      #orders-panel {
        flex: 11;
      }
      #lower {
        flex: 9;
        display: flex;
        gap: 6px;
        min-height: 0;
      }
      #lower .panel {
        flex: 1;
      }
      /* Logon overlay */
      #logon {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 14, 0.92);
        z-index: 10;
      }
      #logon form {
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 6px;
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 320px;
      }
      #logon h1 {
        font-size: 14px;
        letter-spacing: 0.18em;
        margin: 0 0 6px;
        color: var(--accent);
      }
      #logon label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      #logon input {
        background: var(--bg);
        border: 1px solid var(--edge);
        border-radius: 4px;
        color: var(--text);
        padding: 8px 10px;
        font-family: inherit;
      }
      #logon button {
        background: var(--accent);
        color: #06281d;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        padding: 9px;
        letter-spacing: 0.1em;
        cursor: pointer;
      }
      #logon .error {
        color: var(--down);
        font-size: 12px;
        min-height: 16px;
        margin: 0;
      }
      .hidden {
        display: none !important;
      }
      #kill-btn {
        background: #4a2326;
        color: #e8a9a6;
        border: 1px solid #6b3035;
        border-radius: 3px;
        padding: 4px 14px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        cursor: pointer;
      }
      #kill-banner {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #3d1518;
        border: 1px solid var(--down);
        border-radius: 4px;
        color: #f0b6b3;
        padding: 8px 14px;
        font-size: 12px;
        letter-spacing: 0.06em;
      }
      #kill-banner button {
        background: var(--down);
        color: #2a0a0c;
        font-weight: 700;
        border: none;
        border-radius: 3px;
        padding: 5px 12px;
        letter-spacing: 0.1em;
        cursor: pointer;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div id="logon">
      <form id="logon-form">
        <h1>CROSS-ASSET EMS</h1>
        <label for="token">LOGON TOKEN</label>
        <input id="token" name="token" value="trader-token" autocomplete="off" />
        <p class="error" id="logon-error"></p>
        <button type="submit">CONNECT</button>
      </form>
    </div>

    <div id="app" class="hidden">
      <header>
        <h1>CROSS-ASSET EMS</h1>
        <span class="desk" id="session-label">—</span>
        <span class="spacer"></span>
        <button id="kill-btn" title="Firm-wide kill switch">KILL</button>
        <span class="chip" id="chip-md"><i></i>MARKET DATA</span>
        <span class="chip" id="chip-orders"><i></i>ORDERS</span>
        <span class="chip" id="chip-routes"><i></i>ROUTES</span>
        <span class="chip" id="chip-fills"><i></i>FILLS</span>
      </header>
      <div id="kill-banner" class="hidden">
        <span id="kill-banner-text"></span>
        <button id="kill-release">RELEASE</button>
      </div>
      <main>
        <div id="left-col">
          <section class="panel" id="ticket-panel">
            <h2>ORDER TICKET</h2>
            <div id="ticket">
              <label>FIGI</label>
              <input id="tk-figi" list="tk-figi-list" placeholder="BBG…" autocomplete="off" />
              <datalist id="tk-figi-list"></datalist>
              <div class="tk-inst"><span id="tk-name">—</span><span id="tk-hint"></span></div>
              <div class="tk-grid">
                <div>
                  <label>SIDE</label>
                  <select id="tk-side">
                    <option value="1">BUY</option>
                    <option value="2">SELL</option>
                    <option value="5">SELL SHORT</option>
                  </select>
                </div>
                <div>
                  <label id="tk-tif-label">TIF</label>
                  <select id="tk-tif"></select>
                </div>
                <div>
                  <label id="tk-qty-label">QUANTITY</label>
                  <input id="tk-qty" type="number" min="1" step="100" value="100" />
                </div>
                <div>
                  <label id="tk-px-label">PRICE (BLANK = MARKET)</label>
                  <input id="tk-px" type="number" min="0" step="0.0001" />
                </div>
              </div>
              <label>ACCOUNT</label>
              <input id="tk-account" value="ACC-DEMO" autocomplete="off" />
              <p id="tk-feedback"></p>
              <button id="tk-stage" class="primary">STAGE</button>
              <div class="tk-sep">WORKING ORDER ACTIONS</div>
              <select id="tk-order"></select>
              <div class="tk-grid">
                <div>
                  <label>VENUE</label>
                  <select id="tk-venue"></select>
                </div>
                <div class="tk-actions">
                  <button id="tk-ready">READY</button>
                  <button id="tk-route">ROUTE</button>
                </div>
                <div class="tk-actions">
                  <button id="tk-amend">AMEND</button>
                  <button id="tk-cancel" class="danger">CANCEL</button>
                </div>
              </div>
              <p id="tk-result"></p>
              <div class="tk-sep">BASKET / PROGRAM</div>
              <div class="tk-grid">
                <div>
                  <label>BASKET NAME</label>
                  <input id="bk-name" placeholder="tech-rebalance" autocomplete="off" />
                </div>
                <div>
                  <label>LIST (CSV)</label>
                  <input id="bk-file" type="file" accept=".csv,text/csv" />
                </div>
              </div>
              <button id="bk-load">LOAD BASKET</button>
              <select id="bk-select"></select>
              <div class="tk-grid">
                <div>
                  <label>WAVE %</label>
                  <input id="bk-wave-pct" type="number" min="1" max="100" value="25" />
                </div>
                <div class="tk-actions">
                  <button id="bk-wave" class="primary">ROUTE WAVE</button>
                </div>
              </div>
              <p id="bk-result"></p>
            </div>
          </section>
          <section class="panel" id="watchlist-panel">
            <h2 id="watchlist-title">WATCHLIST</h2>
            <perspective-viewer id="watchlist-viewer"></perspective-viewer>
          </section>
        </div>
        <div id="right-col">
          <section class="panel" id="orders-panel">
            <h2>ORDER BLOTTER</h2>
            <perspective-viewer id="orders-viewer"></perspective-viewer>
          </section>
          <div id="lower">
            <section class="panel">
              <h2>ROUTES</h2>
              <perspective-viewer id="routes-viewer"></perspective-viewer>
            </section>
            <section class="panel">
              <h2>FILLS</h2>
              <perspective-viewer id="fills-viewer"></perspective-viewer>
            </section>
            <section class="panel">
              <h2>BASKETS</h2>
              <perspective-viewer id="baskets-viewer"></perspective-viewer>
            </section>
            <section class="panel">
              <h2>INTRADAY P&amp;L</h2>
              <perspective-viewer id="pnl-viewer"></perspective-viewer>
            </section>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
