  - { code: EMS-ORD-6506, category: ORD, severity: error, title: "CRYPTO: Notional currency supported", description: "Quote currency must be one of USD, USDT, USDC, EUR, BTC, ETH; reject exotic-quote markets for non-OTC." }
  - { code: EMS-ORD-6507, category: ORD, severity: error, title: "CRYPTO: Gas token required", description: "When the order is on-chain (DEX) rather than off-chain, gas_token and gas_budget must be set." }
  - { code: EMS-ORD-6508, category: ORD, severity: error, title: "CRYPTO: Chain id match venue", description: "chain_id must match the venue's supported network (e.g., Uniswap v3 mainnet=1, Arbitrum=42161)." }
  - { code: EMS-ORD-6509, category: ORD, severity: error, title: "CRYPTO: Token standard valid", description: "token_standard must be one of {ERC20, ERC721, ERC1155, SPL, NATIVE, BEP20, TRC20}." }
  - { code: EMS-ORD-6510, category: ORD, severity: error, title: "CRYPTO: Trade size minimum", description: "Order notional must meet the venue's minimum (typically $10 for retail, $1000 for OTC desks)." }
  - { code: EMS-ORD-6511, category: ORD, severity: error, title: "CRYPTO: Stablecoin depeg warning", description: "For stablecoin orders, the quote-USD deviation must be < 2% (state error if breached)." }
  - { code: EMS-ORD-6512, category: ORD, severity: error, title: "CRYPTO: Token blacklist check", description: "Token must not be on the desk's blacklist (sanctions, honeypots, rug-pulled)." }

